# Production Docker Compose - 使用已构建好的镜像启动（不在此文件内 build）
# 用法: docker compose -f docker-compose.prod.pull.yml --env-file .env.prod up -d
#
# 镜像来源：本地 build-save 导出 tar，上传服务器后 docker load；在 .env.prod 中配置 DOCKER_IMAGE_WEB / DOCKER_IMAGE_API。
# 域名: xyan.store

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: blog-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-blog_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_DB: ${DB_NAME:-blog_prod}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./apps/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-blog_user} -d ${DB_NAME:-blog_prod}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  api:
    image: ${DOCKER_IMAGE_API:?DOCKER_IMAGE_API is required for pull deploy}
    container_name: blog-api-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-blog_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-blog_prod}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT refresh secret required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${HOST:-https://www.xyan.store}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      EMBEDDINGS_MODEL_NAME: ${EMBEDDINGS_MODEL_NAME:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_MODEL_NAME: ${DASHSCOPE_MODEL_NAME:-}
      UPLOAD_DIR: /app/apps/api/uploads
      UPLOAD_BASE_URL: ${HOST:-https://www.xyan.store}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      VERIFICATION_CODE_LENGTH: ${VERIFICATION_CODE_LENGTH:-6}
      VERIFICATION_CODE_EXPIRY_MINUTES: ${VERIFICATION_CODE_EXPIRY_MINUTES:-10}
      VERIFICATION_CODE_MAX_ATTEMPTS: ${VERIFICATION_CODE_MAX_ATTEMPTS:-5}
      VERIFICATION_CODE_RESEND_COOLDOWN_SECONDS: ${VERIFICATION_CODE_RESEND_COOLDOWN_SECONDS:-60}
    volumes:
      - ./apps/api/uploads:/app/apps/api/uploads
    networks:
      - blog-network

  web:
    image: ${DOCKER_IMAGE_WEB:?DOCKER_IMAGE_WEB is required for pull deploy}
    container_name: blog-web-prod
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${HOST:-https://www.xyan.store}/api
      NEXT_PUBLIC_APP_URL: ${HOST:-https://www.xyan.store}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Blog}
    networks:
      - blog-network

  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    networks:
      - blog-network

volumes:
  postgres_prod_data:
    driver: local

networks:
  blog-network:
    driver: bridge
