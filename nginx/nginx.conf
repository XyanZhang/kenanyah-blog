# Nginx configuration for Blog - xyan.store
# Place SSL certificates in ./nginx/ssl/ directory

events {
    worker_connections 1024;
}

http {
    upstream web {
        server web:3000;
    }

    upstream api {
        server api:3001;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # HTTP - Redirect to HTTPS（无 www 直接跳到 https://www）
    server {
        listen 80;
        server_name xyan.store;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://www.xyan.store$request_uri;
        }
    }
    server {
        listen 80;
        server_name www.xyan.store;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://www.xyan.store$request_uri;
        }
    }

    # HTTPS - 无 www 跳转到 www（统一入口，避免 CORS 等差异）
    server {
        listen 443 ssl http2;
        server_name xyan.store;
        ssl_certificate /etc/nginx/ssl/www.xyan.store.pem;
        ssl_certificate_key /etc/nginx/ssl/www.xyan.store.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        return 301 https://www.xyan.store$request_uri;
    }

    # HTTPS Server - 主站（仅 www）
    server {
        listen 443 ssl http2;
        server_name www.xyan.store;

        # SSL certificates (place in ./nginx/ssl/)
        ssl_certificate /etc/nginx/ssl/www.xyan.store.pem;
        ssl_certificate_key /etc/nginx/ssl/www.xyan.store.key;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000" always;

        # API endpoints - proxy to backend with /api prefix
        location /api {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Increase timeout for long-running requests
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # Uploads：原样转发到 API（API 根路径提供 /uploads）
        location /uploads {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Web app - all other requests go to Next.js
        location / {
            limit_req zone=general_limit burst=50 nodelay;
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}